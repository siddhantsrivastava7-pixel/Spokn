name: Release Windows build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/windows-test-app/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/windows-test-app/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npm run build:packages

      - name: Build Tauri installer
        working-directory: apps/windows-test-app
        run: npx tauri build

      - name: Collect artifacts
        id: artifacts
        shell: pwsh
        run: |
          $nsisDir = "apps/windows-test-app/src-tauri/target/release/bundle/nsis"
          if (-not (Test-Path $nsisDir)) {
            Write-Error "NSIS output not found at $nsisDir"
            exit 1
          }
          $installer = Get-ChildItem $nsisDir -Filter "*.exe" | Select-Object -First 1
          if (-not $installer) {
            Write-Error "No .exe installer produced"
            exit 1
          }
          "installer=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "installer_name=$($installer.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifacts.outputs.installer_name }}
          path: ${{ steps.artifacts.outputs.installer }}
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.artifacts.outputs.installer }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
